<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECHM8 POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="./supabase-config.js"></script>
  <script src="./staff-auth.js"></script>
  <style>
    :root {
      --tm-green: #07896f;
      --tm-green-dark: #076d5b;
      --tm-ink: #17252c;
      --tm-soft: #f2f5f7;
      --tm-line: #dce5e9;
      --tm-muted: #657680;
      --tm-orange: #ef7204;
      --tm-red: #d84b3e;
      --tm-yellow: #f3b23c;
      --tm-card: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--tm-ink);
      background: #e9eef1;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .pos-app {
      height: 100vh;
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) 390px;
      background: var(--tm-soft);
    }

    .rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 18px 10px;
      background: #fff;
      border-right: 1px solid var(--tm-line);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, var(--tm-green), #10a383);
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 10px 24px rgba(7, 137, 111, 0.24);
    }

    .rail-nav {
      display: grid;
      gap: 10px;
      width: 100%;
      margin-top: 10px;
    }

    .rail-button {
      width: 44px;
      height: 44px;
      border: 1px solid var(--tm-line);
      border-radius: 14px;
      color: #2a3a42;
      background: #fff;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .rail-button.active {
      color: #fff;
      border-color: var(--tm-green);
      background: var(--tm-green);
    }

    .rail-bottom {
      margin-top: auto;
      display: grid;
      gap: 10px;
    }

    .workspace {
      min-width: 0;
      padding: 22px;
      overflow: hidden;
    }

    .workspace-view {
      display: none;
      min-height: 0;
      height: 100%;
    }

    .workspace-view.active {
      display: grid;
    }

    .product-view {
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 16px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      gap: 12px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #9aa8ae;
      font-size: 20px;
    }

    .search-input {
      width: 100%;
      height: 54px;
      border: 1px solid var(--tm-line);
      border-radius: 16px;
      padding: 0 18px 0 50px;
      color: var(--tm-ink);
      background: #fff;
      outline: none;
      box-shadow: 0 10px 24px rgba(16, 30, 38, 0.04);
    }

    .search-input:focus {
      border-color: rgba(7, 137, 111, 0.45);
      box-shadow: 0 0 0 4px rgba(7, 137, 111, 0.08);
    }

    .store-select,
    .staff-pill {
      height: 54px;
      border: 1px solid var(--tm-line);
      border-radius: 16px;
      background: #fff;
      color: var(--tm-ink);
      padding: 0 14px;
      font-weight: 700;
    }

    .staff-pill {
      min-width: 160px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      color: #41525a;
      cursor: pointer;
    }

    .staff-pill:hover,
    .staff-pill:focus-visible {
      border-color: rgba(7, 137, 111, 0.45);
      box-shadow: 0 0 0 4px rgba(7, 137, 111, 0.08);
      outline: none;
    }

    .status-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .category-tabs {
      display: flex;
      gap: 10px;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tab-chip {
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--tm-line);
      border-radius: 999px;
      color: #405058;
      background: #fff;
      font-weight: 800;
      white-space: nowrap;
    }

    .tab-chip.active {
      color: #fff;
      border-color: var(--tm-green);
      background: var(--tm-green);
    }

    .sync-status {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid #d7e3e0;
      color: #49615c;
      background: #fff;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .product-grid {
      min-height: 0;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      align-content: start;
      gap: 16px;
      padding: 2px 2px 18px;
    }

    .product-card {
      position: relative;
      height: 176px;
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
      padding: 16px;
      border: 1px solid var(--tm-line);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(13, 25, 32, 0.05);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }

    .product-card:hover {
      border-color: rgba(7, 137, 111, 0.35);
      box-shadow: 0 16px 34px rgba(13, 25, 32, 0.08);
      transform: translateY(-1px);
    }

    .product-card:focus-visible {
      outline: 3px solid rgba(7, 137, 111, 0.22);
      outline-offset: 2px;
    }

    .product-image {
      width: 104px;
      height: 104px;
      align-self: center;
      object-fit: contain;
      border-radius: 14px;
      background: #f6f8f9;
      border: 1px solid #edf2f4;
    }

    .product-info {
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .product-name {
      margin: 0;
      min-height: 58px;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 850;
      color: #24343b;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 28px;
    }

    .sale-price {
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }

    .stock-pill {
      color: var(--tm-green-dark);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.15;
      text-align: right;
      white-space: nowrap;
    }

    .stock-pill.low {
      color: #a75e00;
    }

    .stock-pill.out {
      color: var(--tm-red);
    }

    .empty-state {
      grid-column: 1 / -1;
      min-height: 300px;
      display: grid;
      place-items: center;
      color: var(--tm-muted);
      text-align: center;
      border: 1px dashed #cbd8dd;
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
    }

    .checkout-panel {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
      padding: 22px 18px 18px;
      background: #fff;
      border-left: 1px solid var(--tm-line);
      overflow: hidden;
    }

    .customer-card {
      display: grid;
      gap: 12px;
    }

    .customer-row {
      height: 54px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 34px;
      gap: 10px;
      align-items: center;
      padding: 0 10px;
      border-radius: 16px;
      background: #f3f6f7;
      border: 1px solid #e5ecef;
    }

    .customer-row i {
      color: var(--tm-green);
      font-size: 18px;
      text-align: center;
    }

    .customer-input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #31424a;
      font-weight: 800;
    }

    .cart-scroll {
      min-height: 0;
      overflow: auto;
      border-radius: 18px;
      background: #fafcfc;
      border: 1px solid #e7eef1;
    }

    .cart-empty {
      height: 100%;
      min-height: 280px;
      display: grid;
      place-items: center;
      padding: 30px;
      text-align: center;
      color: #586870;
    }

    .cart-empty-icon {
      width: 86px;
      height: 86px;
      display: grid;
      place-items: center;
      margin: 0 auto 14px;
      border-radius: 28px;
      color: var(--tm-green);
      background: #e8f5f1;
      font-size: 38px;
    }

    .cart-list {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 13px;
      border-radius: 15px;
      background: #fff;
      border: 1px solid #e2ebee;
    }

    .cart-name {
      margin: 0 0 6px;
      font-size: 14px;
      line-height: 1.32;
      font-weight: 850;
    }

    .cart-small {
      color: var(--tm-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .qty-control {
      display: inline-grid;
      grid-template-columns: 30px 36px 30px;
      align-items: center;
      height: 32px;
      margin-top: 10px;
      border: 1px solid #d8e3e7;
      border-radius: 999px;
      overflow: hidden;
    }

    .qty-control button {
      height: 30px;
      border: 0;
      background: #f4f7f8;
      color: #31424a;
      font-weight: 900;
    }

    .qty-control span {
      text-align: center;
      font-size: 13px;
      font-weight: 900;
    }

    .cart-side {
      display: grid;
      justify-items: end;
      gap: 8px;
    }

    .cart-line-total {
      font-weight: 900;
      white-space: nowrap;
    }

    .icon-action {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #8d3a31;
      background: #fff1ef;
    }

    .checkout-footer {
      display: grid;
      gap: 12px;
    }

    .summary-box {
      display: grid;
      gap: 9px;
      padding: 14px;
      border-radius: 18px;
      background: #f7fafb;
      border: 1px solid #e3ecef;
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #506068;
      font-size: 14px;
      font-weight: 750;
    }

    .summary-line.total {
      padding-top: 9px;
      border-top: 1px solid #dde8eb;
      color: var(--tm-ink);
      font-size: 24px;
      font-weight: 950;
    }

    .payment-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .payment-option {
      min-height: 46px;
      border: 1px solid var(--tm-line);
      border-radius: 14px;
      background: #fff;
      color: #44545c;
      font-weight: 850;
    }

    .payment-option.active {
      border-color: var(--tm-green);
      color: var(--tm-green-dark);
      background: #e9f7f3;
    }

    .footer-actions {
      display: grid;
      grid-template-columns: 72px 72px minmax(0, 1fr);
      gap: 10px;
    }

    .soft-action,
    .pay-action {
      min-height: 58px;
      border: 0;
      border-radius: 16px;
      font-weight: 900;
    }

    .soft-action {
      display: grid;
      place-items: center;
      gap: 4px;
      color: #4d5d64;
      background: #eef4f5;
      font-size: 12px;
    }

    .soft-action.danger {
      color: var(--tm-orange);
      background: #fff0e5;
    }

    .soft-action i {
      font-size: 20px;
    }

    .pay-action {
      color: #fff;
      background: var(--tm-green);
      font-size: 18px;
      box-shadow: 0 14px 26px rgba(7, 137, 111, 0.22);
    }

    .pay-action:disabled {
      background: #b7c7cc;
      box-shadow: none;
      cursor: not-allowed;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(9, 18, 24, 0.46);
      backdrop-filter: blur(6px);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .special-modal {
      width: min(420px, 100%);
      display: grid;
      gap: 16px;
      padding: 22px;
      border-radius: 18px;
      border: 1px solid var(--tm-line);
      background: #fff;
      box-shadow: 0 24px 60px rgba(10, 20, 30, 0.18);
    }

    .special-modal h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .special-fields {
      display: grid;
      gap: 12px;
    }

    .special-fields label {
      display: grid;
      gap: 7px;
      color: #405058;
      font-size: 13px;
      font-weight: 800;
    }

    .special-fields input {
      width: 100%;
      height: 50px;
      border: 1px solid var(--tm-line);
      border-radius: 14px;
      padding: 0 14px;
      color: var(--tm-ink);
      background: #fff;
      outline: none;
    }

    .special-fields input:focus {
      border-color: rgba(7, 137, 111, 0.45);
      box-shadow: 0 0 0 4px rgba(7, 137, 111, 0.08);
    }

    .special-error {
      min-height: 18px;
      color: var(--tm-red);
      font-size: 13px;
      font-weight: 700;
    }

    .special-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .repair-view {
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      overflow: hidden;
    }

    .repair-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      padding: 16px 18px;
      border: 1px solid var(--tm-line);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(16, 30, 38, 0.04);
    }

    .repair-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 950;
    }

    .repair-subtitle {
      margin-top: 5px;
      color: var(--tm-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .repair-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .repair-action {
      min-height: 44px;
      border: 1px solid var(--tm-line);
      border-radius: 14px;
      padding: 0 14px;
      background: #fff;
      color: #31434c;
      font-weight: 900;
    }

    .repair-action.primary {
      border-color: var(--tm-green);
      color: #fff;
      background: var(--tm-green);
    }

    .repair-action:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    .repair-scroll {
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .repair-empty,
    .repair-panel {
      border: 1px solid var(--tm-line);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(16, 30, 38, 0.04);
    }

    .repair-empty {
      min-height: 260px;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--tm-muted);
      text-align: center;
    }

    .repair-stack {
      display: grid;
      gap: 16px;
    }

    .repair-panel {
      padding: 18px;
    }

    .repair-panel-title {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 950;
    }

    .repair-panel-text {
      margin: 0 0 16px;
      color: var(--tm-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .repair-fields {
      display: grid;
      gap: 14px;
    }

    .repair-field {
      display: grid;
      gap: 7px;
      color: #283b44;
      font-size: 13px;
      font-weight: 900;
    }

    .repair-input,
    .repair-select,
    .repair-textarea {
      width: 100%;
      border: 1px solid var(--tm-line);
      border-radius: 14px;
      color: var(--tm-ink);
      background: #fff;
      outline: none;
    }

    .repair-input,
    .repair-select {
      height: 52px;
      padding: 0 14px;
    }

    .repair-textarea {
      min-height: 92px;
      padding: 12px 14px;
      resize: vertical;
    }

    .repair-input:focus,
    .repair-select:focus,
    .repair-textarea:focus {
      border-color: rgba(7, 137, 111, 0.45);
      box-shadow: 0 0 0 4px rgba(7, 137, 111, 0.08);
    }

    .repair-confirm-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }

    .repair-quote {
      color: #3e5058;
      font-size: 13px;
      font-weight: 800;
    }

    .repair-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .repair-chip {
      min-height: 40px;
      border: 1px solid var(--tm-line);
      border-radius: 999px;
      padding: 0 14px;
      background: #f8fafb;
      color: #24343b;
      font-weight: 900;
    }

    .repair-chip.active {
      border-color: var(--tm-green);
      color: #fff;
      background: var(--tm-green);
    }

    .repair-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .test-card {
      display: grid;
      gap: 9px;
      padding: 12px;
      border: 1px solid var(--tm-line);
      border-radius: 14px;
      background: #fbfdfe;
    }

    .test-name {
      font-size: 13px;
      font-weight: 950;
    }

    .test-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .test-option {
      min-height: 34px;
      border: 1px solid var(--tm-line);
      border-radius: 10px;
      background: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .test-option.active {
      border-color: var(--tm-green);
      color: #fff;
      background: var(--tm-green);
    }

    .media-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .media-preview-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .media-preview {
      width: 96px;
      min-height: 76px;
      border: 1px solid var(--tm-line);
      border-radius: 12px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #f7fafb;
      color: var(--tm-muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .media-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .repair-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .repair-summary-item {
      padding: 11px 12px;
      border: 1px solid var(--tm-line);
      border-radius: 12px;
      background: #f7fafb;
    }

    .repair-summary-label {
      color: var(--tm-muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .repair-summary-value {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 16px;
      color: #173229;
      background: #e7f8f2;
      border: 1px solid #bfe4d8;
      box-shadow: 0 18px 40px rgba(13,25,32,0.14);
      font-weight: 800;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1080px) {
      body { overflow: auto; }

      .pos-app {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 58px minmax(0, 1fr);
      }

      .checkout-panel {
        grid-column: 1 / -1;
        min-height: 520px;
        border-left: 0;
        border-top: 1px solid var(--tm-line);
      }
    }

    @media (max-width: 720px) {
      .pos-app {
        grid-template-columns: 1fr;
      }

      .rail {
        position: sticky;
        top: 0;
        z-index: 10;

    const INTERNAL_PRODUCTS_ENDPOINT = 'https://fwlronvmgqzkleofriis.supabase.co/functions/v1/pos-products';
    const els = {
      productGrid: document.getElementById('productGrid'),

      searchInput: document.getElementById('searchInput'),
      storeSelect: document.getElementById('storeSelect'),
      syncStatus: document.getElementById('syncStatus'),

      summaryItems: document.getElementById('summaryItems'),

      specialProductPrice: document.getElementById('specialProductPrice'),
      specialProductCancel: document.getElementById('specialProductCancel'),

    };

    const mobileRepairTestItems = [
      'Outer Glass / Screen Condition',
      'Touch Response',
      'Display / OLED / LCD',
      'Face ID / Fingerprint Unlock',
      'Front Camera',
      'Rear Camera',
      'Earpiece Speaker',
      'Loudspeaker',
      'Microphone',
      'Charging Port / Wireless Charging',
      'Battery Health / Charging',
      'Power Button',
      'Volume Buttons / Mute Switch',
      'Wi-Fi / Bluetooth',
      'SIM / eSIM Detection',
      'Proximity Sensor / Auto Brightness',
      'Vibration / Haptics',
      'Frame / Housing Condition',
      'Back Glass / Rear Cover',
      'Water Damage Indicators'
    ];

    const computerRepairTestItems = [
      'Screen / Display Condition',
      'Keyboard',
      'Trackpad / Mouse',
      'Touchscreen',
      'Camera',
      'Microphone',
      'Speakers',
      'Wi-Fi / Bluetooth',
      'USB / I/O Ports',
      'Charging Port / Charger Detection',
      'Battery Health / Charging',
      'Power Button',
      'Boot / Operating System',
      'Storage Check',
      'Fan / Thermal Condition',
      'Hinges / Housing Condition',
      'Liquid Damage Indicators'
    ];

    function money(value) {
      return new Intl.NumberFormat('en-AU', { style: 'currency', currency: 'AUD' }).format(Number(value || 0));
    }

    function normalizeStoreKey(value) {
      return String(value || '').toLowerCase().replace(/techm8/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function getProductStock(product) {
      if (typeof product.qty_on_hand === 'number') return product.qty_on_hand;
      if (product.store_stock && typeof product.store_stock[state.storeId] === 'number') return product.store_stock[state.storeId];
      if (Array.isArray(product.store_inventory)) {
        const currentStore = normalizeStoreKey(state.storeId);
        const row = product.store_inventory.find(item => {
          return [
            item.store_id,
            item.store_slug,
            item.store_name,
            item.branch,
            item.name
          ].some(value => normalizeStoreKey(value) === currentStore);
        });
        if (row) return Number(row.qty_on_hand ?? row.stock_qty ?? row.qty ?? row.quantity ?? 0);
      }
      if (product.store_inventory && typeof product.store_inventory === 'object') {
        const currentStore = normalizeStoreKey(state.storeId);
        const matchedKey = Object.keys(product.store_inventory).find(key => normalizeStoreKey(key) === currentStore);
        if (matchedKey) return Number(product.store_inventory[matchedKey] || 0);
      }
      return 0;
    }

    function productImage(product) {
      if (product.image_url) return product.image_url;
      const label = escapeHtml((product.name || 'TECHM8').slice(0, 18));
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
          <rect width="160" height="160" rx="22" fill="#f6f8f9"/>
          <rect x="18" y="18" width="124" height="124" rx="18" fill="#ffffff" stroke="#dce5e9"/>
          <text x="80" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#07896f">${label}</text>
        </svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function normalizeProducts(payload) {
      const list = Array.isArray(payload) ? payload : (payload.products || payload.rows || payload.data || []);
      return list.map(item => ({
        id: String(item.id || item.product_id || item.sku || crypto.randomUUID()),
        sku: item.sku || '',
        name: item.name || item.product_name || 'Unnamed product',
        category: getProductCategory(item),
        cost_price: Number(item.cost_price || item.cost || 0),
        sale_price: Number(item.sale_price || item.price || item.sell_price || 0),
        barcode: item.barcode || '',
        image_url: item.image_url || item.thumbnail_url || item.image || '',
        qty_on_hand: item.qty_on_hand == null && item.stock_qty == null && item.stock == null
          ? undefined
          : Number(item.qty_on_hand ?? item.stock_qty ?? item.stock ?? 0),
        store_inventory: item.store_inventory || null
      }));
    }

    function getProductCategory(item) {
      const candidates = [
        item.category,
        item.category_name,
        item.product_category,
        item.product_category_name,
        item.collection,
        item.collection_name,
        item.product_type,
        item.type,
        item.category_slug
      ];

      for (const candidate of candidates) {
        const label = getCategoryLabel(candidate);
        if (label) return label;
      }

      return 'Uncategorized';
    }

    function getCategoryLabel(value) {
      if (value == null) return '';
      if (typeof value === 'string' || typeof value === 'number') {
        return String(value).trim();
      }
      if (Array.isArray(value)) {
        for (const item of value) {
          const label = getCategoryLabel(item);
          if (label) return label;
        }
        return '';
      }
      if (typeof value === 'object') {
        return getCategoryLabel(value.name)
          || getCategoryLabel(value.title)
          || getCategoryLabel(value.label)
          || getCategoryLabel(value.slug);
      }
      return '';
    }

    function uniqueSorted(values) {
      return Array.from(new Set(values.filter(Boolean))).sort((a, b) => a.localeCompare(b));
    }

    function quotePriceLabel(price) {
      const raw = String(price || '').trim();
      if (!raw || raw.toUpperCase() === 'N/A') return 'N/A';
      return raw.startsWith('$') ? raw : '$' + raw;
    }

    function repairDeviceType(quote) {
      const brandModel = ((quote && quote.brand) || '') + ' ' + ((quote && quote.model) || '');
      if (/ipad|tablet/i.test(brandModel)) return 'Tablet';
      if (/mac|acer|dell|hp|lenovo|laptop|desktop|surface/i.test(brandModel)) return 'Computer';
      return 'Phone';
    }

    function currentRepairTestItems() {
      return state.repair.testProfile === 'computer' ? computerRepairTestItems : mobileRepairTestItems;
    }

    function repairDeviceIdFieldHtml() {
      if (state.repair.deviceIdType === 'serial') {
        return `
          <label class="repair-field">
            Serial Number
            <input class="repair-input" id="repairDeviceSerial" type="text" placeholder="Type the serial number" value="${escapeHtml(state.repair.deviceSerial)}">
          </label>
        `;
      }
      if (state.repair.deviceIdType === 'unavailable') {
        return `
          <label class="repair-field">
            Why it is unavailable
            <textarea class="repair-textarea" id="repairDeviceIdUnavailable" placeholder="Example: unit cannot boot, label missing, or housing too damaged to read">${escapeHtml(state.repair.deviceIdUnavailable)}</textarea>
          </label>
        `;
      }
      return `
        <label class="repair-field">
          IMEI
          <input class="repair-input" id="repairDeviceImei" type="text" placeholder="Scan or type the IMEI" value="${escapeHtml(state.repair.deviceImei)}">
        </label>
      `;
    }

    async function loadRepairQuotes() {
      try {
        let rows = [];
        const supabase = window.TECHM8_SUPABASE || null;
        if (supabase) {
          const pageSize = 1000;
          let from = 0;
          while (true) {
            const response = await fetch(
              supabase.url + '/rest/v1/repair_prices?select=brand,model,issue,price,turnaround_time&order=brand.asc&order=model.asc&order=issue.asc&limit=' + pageSize + '&offset=' + from,
              {
                headers: {
                  apikey: supabase.anonKey,
                  Authorization: 'Bearer ' + supabase.anonKey
                }
              }
            );
            if (!response.ok) break;
            const pageRows = await response.json();
            if (!Array.isArray(pageRows) || !pageRows.length) break;
            rows.push(...pageRows.map(row => ({
              brand: row.brand,
              model: row.model,
              issue: row.issue,
              price: row.price,
              time: row.turnaround_time || ''
            })));
            if (pageRows.length < pageSize) break;
            from += pageSize;
          }
        }
        if (!rows.length) {
          const response = await fetch('./data.json', { cache: 'no-store' });
          if (!response.ok) throw new Error('Repair prices unavailable');
          const text = await response.text();
          rows = JSON.parse(text.replace(/^\uFEFF/, ''));
        }
        state.repairQuotes = Array.isArray(rows) ? rows : [];
      } catch (error) {
        state.repairQuotes = [];
        showToast(error.message || 'Repair prices unavailable.');
      }
      renderRepairWorkspace();
    }

    function setActiveView(view) {
      state.activeView = view;
      els.productView.classList.toggle('active', view === 'products');
      els.repairView.classList.toggle('active', view === 'repair');
      els.productNavBtn.classList.toggle('active', view === 'products');
      els.repairNavBtn.classList.toggle('active', view === 'repair');
    }

    function resetRepairState() {
      state.repair = {
        started: false,
        intakeOpen: false,
        ticketId: '',
        brand: '',
        model: '',
        issue: '',
        quote: null,
        quotedPrice: '',
        deviceIdType: 'imei',
        deviceImei: '',
        deviceSerial: '',
        deviceIdUnavailable: '',
        password: '',
        testNotes: '',
        passwordType: 'text',
        testable: 'yes',
        testProfile: 'mobile',
        tests: {},
        media: []
      };
    }

    function startRepairTicket() {
      if (state.repair.intakeOpen) {
        showToast('Clear the current ticket before starting another repair.');
        return;
      }
      state.repair.started = true;
      renderRepairWorkspace();
    }

    function clearRepairTicket() {
      if (!state.repair.started) return;
      if (!confirm('Clear this repair ticket?')) return;
      resetRepairState();
      renderRepairWorkspace();
      showToast('Repair ticket cleared.');
    }

    function repairOptions() {
      const brands = uniqueSorted(state.repairQuotes.map(row => row.brand));
      const models = uniqueSorted(state.repairQuotes
        .filter(row => row.brand === state.repair.brand)
        .map(row => row.model));
      const issues = uniqueSorted(state.repairQuotes
        .filter(row => row.brand === state.repair.brand && row.model === state.repair.model)
        .map(row => row.issue));
      return { brands, models, issues };
    }

    function setRepairSelection(field, value) {
      state.repair[field] = value;
      if (field === 'brand') {
        state.repair.model = '';
        state.repair.issue = '';
      }
      if (field === 'model') {
        state.repair.issue = '';
      }
      state.repair.quote = state.repairQuotes.find(row => {
        return row.brand === state.repair.brand
          && row.model === state.repair.model
          && row.issue === state.repair.issue;
      }) || null;
      state.repair.intakeOpen = false;
      state.repair.ticketId = '';
      renderRepairWorkspace();
    }

    function confirmRepairSelection() {
      if (!state.repair.quote) {
        showToast('Select brand, model, and issue first.');
        return;
      }
      state.repair.ticketId = 'RPR-' + Date.now();
      state.repair.intakeOpen = true;
      state.repair.quotedPrice = quotePriceLabel(state.repair.quote.price);
      renderRepairWorkspace();
      showToast('Repair check opened.');
    }

    function optionHtml(values, selected, placeholder) {
      return `<option value="">${placeholder}</option>` + values.map(value => {
        return `<option value="${escapeHtml(value)}" ${value === selected ? 'selected' : ''}>${escapeHtml(value)}</option>`;
      }).join('');
    }

    function repairSummaryHtml() {
      const quote = state.repair.quote || {};
      return `
        <div class="repair-summary">
          <div class="repair-summary-item">
            <div class="repair-summary-label">Ticket</div>
            <div class="repair-summary-value">${escapeHtml(state.repair.ticketId || 'Draft')}</div>
          </div>
          <div class="repair-summary-item">
            <div class="repair-summary-label">Device</div>
            <div class="repair-summary-value">${escapeHtml((quote.brand || '') + ' ' + (quote.model || ''))}</div>
          </div>
          <div class="repair-summary-item">
            <div class="repair-summary-label">Issue</div>
            <div class="repair-summary-value">${escapeHtml(quote.issue || '')}</div>
          </div>
          <div class="repair-summary-item">
            <div class="repair-summary-label">Quote</div>
            <div class="repair-summary-value">${escapeHtml(quotePriceLabel(quote.price))}</div>
          </div>
        </div>
      `;
    }

    function renderRepairWorkspace() {
      if (!els.repairWorkspace) return;
      if (!state.repair.started) {
        els.repairWorkspace.innerHTML = `
          <div class="repair-empty">
            <div>
              <div class="cart-empty-icon"><i class="bi bi-tools"></i></div>
              <strong>No repair ticket started</strong>
              <div>Click New Repair to choose Brand - Model - Issue and start the device check.</div>
            </div>
          </div>
        `;
        return;
      }

      const { brands, models, issues } = repairOptions();
      const quote = state.repair.quote;
      els.repairWorkspace.innerHTML = `
        <div class="repair-stack">
          <div class="repair-panel">
            <h2 class="repair-panel-title">New Repair</h2>
            <p class="repair-panel-text">Select the quote path in order. The selected issue opens the inspection form inside this POS screen.</p>
            <div class="repair-fields">
              <label class="repair-field">
                Select Brand
                <select id="repairBrandSelect" class="repair-select" ${state.repair.intakeOpen ? 'disabled' : ''}>
                  ${optionHtml(brands, state.repair.brand, 'Choose brand')}
                </select>
              </label>
              <label class="repair-field">
                Select Model
                <select id="repairModelSelect" class="repair-select" ${!state.repair.brand || state.repair.intakeOpen ? 'disabled' : ''}>
                  ${optionHtml(models, state.repair.model, 'Choose model')}
                </select>
              </label>
              <label class="repair-field">
                Select Issue
                <select id="repairIssueSelect" class="repair-select" ${!state.repair.model || state.repair.intakeOpen ? 'disabled' : ''}>
                  ${optionHtml(issues, state.repair.issue, 'Choose issue')}
                </select>
              </label>
            </div>
            <div class="repair-confirm-row">
              <div class="repair-quote">
                ${quote ? `Quote: ${escapeHtml(quotePriceLabel(quote.price))}${quote.time ? ` · ${escapeHtml(quote.time)}` : ''}` : 'Choose an issue to see the quote.'}
              </div>
              <button id="confirmRepairBtn" class="repair-action primary" type="button" ${quote && !state.repair.intakeOpen ? '' : 'disabled'}>Confirm</button>
            </div>
          </div>
          ${state.repair.intakeOpen ? repairIntakeHtml() : ''}
        </div>
      `;
    }

    function repairIntakeHtml() {
      const quote = state.repair.quote || {};
      const mediaHtml = state.repair.media.map(item => `
        <div class="media-preview">
          ${item.type === 'image' ? `<img src="${item.src}" alt="">` : '<span>Video<br>placeholder</span>'}
        </div>
      `).join('');
      return `
        <div class="repair-panel">
          <h2 class="repair-panel-title">Security And Unlock Details</h2>
          <p class="repair-panel-text">Record how the device can be unlocked so technicians can test the unit safely and efficiently.</p>
          <div class="repair-field">
            Password Type
            <div class="repair-chip-row" data-repair-chip-group="passwordType">
              <button class="repair-chip ${state.repair.passwordType === 'text' ? 'active' : ''}" type="button" data-value="text">Text or numeric password</button>
              <button class="repair-chip ${state.repair.passwordType === 'pattern' ? 'active' : ''}" type="button" data-value="pattern">Pattern lock</button>
              <button class="repair-chip ${state.repair.passwordType === 'none' ? 'active' : ''}" type="button" data-value="none">Not provided</button>
            </div>
          </div>
          <label class="repair-field">
            Password
            <input class="repair-input" id="repairPassword" type="text" placeholder="Example: 123456 or Techm8@123" value="${escapeHtml(state.repair.password)}">
          </label>
        </div>

        <div class="repair-panel">
          <h2 class="repair-panel-title">Photos And Evidence</h2>
          <p class="repair-panel-text">Capture photos of the device condition at drop-off. You can also add a video placeholder if media was recorded separately.</p>
          <div class="media-actions">
            <button id="repairCameraBtn" class="repair-action primary" type="button">Open camera</button>
            <button id="repairVideoBtn" class="repair-action" type="button">Add video placeholder</button>
            <input id="repairPhotoInput" type="file" accept="image/*" capture="environment" multiple hidden>
          </div>
          <div class="repair-panel-text" style="margin-top:10px;">Photo previews stay in this browser session until a backend upload flow is connected.</div>
          <div class="media-preview-list">${mediaHtml}</div>
        </div>

        <div class="repair-panel">
          <h2 class="repair-panel-title">Function Test</h2>
          <p class="repair-panel-text">Choose whether the unit can be tested right now. If testing is not possible, record the reason and skip the checklist.</p>
          ${repairSummaryHtml()}
          <div class="repair-fields">
            <div class="repair-field">
              Can this device be tested?
              <div class="repair-chip-row" data-repair-chip-group="testable">
                <button class="repair-chip ${state.repair.testable === 'yes' ? 'active' : ''}" type="button" data-value="yes">Yes, test now</button>
                <button class="repair-chip ${state.repair.testable === 'no' ? 'active' : ''}" type="button" data-value="no">No, cannot test</button>
              </div>
            </div>
            <div class="repair-field">
              Test Profile
              <div class="repair-chip-row" data-repair-chip-group="testProfile">
                <button class="repair-chip ${state.repair.testProfile === 'mobile' ? 'active' : ''}" type="button" data-value="mobile">Mobile Device</button>
                <button class="repair-chip ${state.repair.testProfile === 'computer' ? 'active' : ''}" type="button" data-value="computer">Laptop / Desktop</button>
              </div>
            </div>
            <div class="repair-field">
              Device ID Type
              <div class="repair-chip-row" data-repair-chip-group="deviceIdType">
                <button class="repair-chip ${state.repair.deviceIdType === 'imei' ? 'active' : ''}" type="button" data-value="imei">IMEI</button>
                <button class="repair-chip ${state.repair.deviceIdType === 'serial' ? 'active' : ''}" type="button" data-value="serial">Serial Number</button>
                <button class="repair-chip ${state.repair.deviceIdType === 'unavailable' ? 'active' : ''}" type="button" data-value="unavailable">Unavailable</button>
              </div>
            </div>
            ${repairDeviceIdFieldHtml()}
            <div class="repair-grid">
              ${currentRepairTestItems().map(name => {
                const current = state.repair.tests[name] || '';
                return `
                  <div class="test-card">
                    <div class="test-name">${escapeHtml(name)}</div>
                    <div class="test-options" data-test-name="${escapeHtml(name)}">
                      <button class="test-option ${current === 'Pass' ? 'active' : ''}" type="button" data-value="Pass">Pass</button>
                      <button class="test-option ${current === 'Fail' ? 'active' : ''}" type="button" data-value="Fail">Fail</button>
                      <button class="test-option ${current === 'N/A' ? 'active' : ''}" type="button" data-value="N/A">N/A</button>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
            <label class="repair-field">
              Function Test Notes
              <textarea class="repair-textarea" id="repairTestNotes" placeholder="Example: display does not light up, so touch and Face ID could not be confirmed">${escapeHtml(state.repair.testNotes)}</textarea>
            </label>
          </div>
        </div>
      `;
    }

    async function loadProducts() {
      const endpoint = window.TECHM8_POS_PRODUCTS_ENDPOINT
        || localStorage.getItem('techm8_pos_products_endpoint')
        || INTERNAL_PRODUCTS_ENDPOINT;

      if (!endpoint) {
        state.products = demoProducts;
        setSyncStatus('Demo products loaded', 'bi-database-check');
        renderAll();
        return;
      }

      try {
        const url = new URL(endpoint, window.location.href);
        url.searchParams.set('page', '1');
        url.searchParams.set('limit', '500');
        const headers = {};
        const staffToken = window.Techm8StaffAuth && window.Techm8StaffAuth.getToken
          ? window.Techm8StaffAuth.getToken()
          : '';

        if (!staffToken) {
          throw new Error('Staff session missing. Please unlock POS again.');
        }

        if (staffToken) {
          headers['x-staff-session'] = staffToken;
        }

        if (window.TECHM8_SUPABASE && window.TECHM8_SUPABASE.anonKey) {
          headers.apikey = window.TECHM8_SUPABASE.anonKey;
          headers.Authorization = `Bearer ${window.TECHM8_SUPABASE.anonKey}`;
        }

        const response = await fetch(url.toString(), { headers });
        if (!response.ok) {
          const errorPayload = await response.json().catch(() => ({}));
          throw new Error(errorPayload.message || `Product API request failed: ${response.status}`);
        }
        const payload = await response.json();
        state.products = normalizeProducts(payload);
        setSyncStatus('Live products loaded', 'bi-cloud-check');
      } catch (error) {
        console.error(error);
        state.products = [];
        setSyncStatus(error.message || 'Live products unavailable', 'bi-exclamation-circle');
      }

      renderAll();
    }

    function setSyncStatus(text, icon) {
      els.syncStatus.innerHTML = `<i class="bi ${icon}"></i><span>${text}</span>`;
    }

    function categories() {
      return ['All', ...Array.from(new Set(state.products.map(product => product.category).filter(Boolean))).sort()];
    }

    function filteredProducts() {
      const query = state.search.trim().toLowerCase();
      return state.products.filter(product => {
        const inCategory = state.category === 'All' || product.category === state.category;
        const searchable = [product.name, product.sku, product.barcode, product.category].join(' ').toLowerCase();
        return inCategory && (!query || searchable.includes(query));
      }).sort((a, b) => getProductStock(b) - getProductStock(a));
    }

    function renderCategories() {
      els.categoryTabs.innerHTML = categories().map(category => `
        <button class="tab-chip ${category === state.category ? 'active' : ''}" type="button" data-category="${category}">
          ${category}
        </button>
      `).join('');
    }

    function renderProducts() {
      const products = filteredProducts();
      if (!products.length) {
        els.productGrid.innerHTML = `
          <div class="empty-state">
            <div>
              <div class="cart-empty-icon"><i class="bi bi-search"></i></div>
              <strong>No matching products</strong>
              <div>Try another product name, SKU, barcode, or category.</div>
            </div>
          </div>
        `;
        return;
      }

      els.productGrid.innerHTML = products.map(product => {
        const stock = getProductStock(product);
        const stockClass = stock <= 0 ? 'out' : (stock <= 2 ? 'low' : '');
        return `
          <article class="product-card" data-add="${product.id}" role="button" tabindex="0" aria-label="Add ${escapeHtml(product.name)} to cart">
            <img class="product-image" src="${productImage(product)}" alt="">
            <div class="product-info">
              <h2 class="product-name">${escapeHtml(product.name)}</h2>
              <div class="product-price">
                <span class="sale-price">${money(product.sale_price)}</span>
                <span class="stock-pill ${stockClass}">${stock} in stock</span>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderCart() {
      if (!state.cart.length) {
        els.cartArea.innerHTML = `
          <div class="cart-empty">
            <div>
              <div class="cart-empty-icon"><i class="bi bi-cart-plus"></i></div>
              <strong>No Item</strong>
              <div>Select a product to start a sale.</div>
            </div>
          </div>
        `;
      } else {
        els.cartArea.innerHTML = `
          <div class="cart-list">
            ${state.cart.map(item => `
              <div class="cart-item">
                <div>
                  <h3 class="cart-name">${escapeHtml(item.name)}</h3>
                  <div class="cart-small">${escapeHtml(item.sku || 'No SKU')} · ${money(item.sale_price)} each</div>
                  <div class="qty-control">
                    <button type="button" data-qty="${item.id}" data-dir="-1">-</button>
                    <span>${item.qty}</span>
                    <button type="button" data-qty="${item.id}" data-dir="1">+</button>
                  </div>
                </div>
                <div class="cart-side">
                  <div class="cart-line-total">${money(item.sale_price * item.qty)}</div>
                  <button class="icon-action" type="button" data-remove="${item.id}" title="Remove item">
                    <i class="bi bi-x-lg"></i>
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }

      const itemCount = state.cart.reduce((sum, item) => sum + item.qty, 0);
      const subtotal = state.cart.reduce((sum, item) => sum + item.sale_price * item.qty, 0);
      const gst = subtotal / 11;
      els.summaryItems.textContent = itemCount;
      els.summarySubtotal.textContent = money(subtotal);
      els.summaryGst.textContent = money(gst);
      els.summaryTotal.textContent = money(subtotal);
      els.payBtn.textContent = subtotal > 0 ? `${money(subtotal)} Pay Balance` : 'Pay Balance';
      els.payBtn.disabled = subtotal <= 0;
    }

    function renderAll() {
      renderCategories();
      renderProducts();
      renderCart();
    }

    function addToCart(productId) {
      const product = state.products.find(item => item.id === productId);
      if (!product) return;

      const current = state.cart.find(item => item.id === productId);
      if (current) {
        current.qty += 1;
      } else {
        state.cart.push({ ...product, qty: 1 });
      }
      renderCart();
    }

    function changeQty(productId, dir) {
      const item = state.cart.find(cartItem => cartItem.id === productId);
      if (!item) return;
      const nextQty = item.qty + Number(dir);
      if (nextQty <= 0) {
        state.cart = state.cart.filter(cartItem => cartItem.id !== productId);
      } else {
        item.qty = nextQty;
      }
      renderCart();
    }

    function removeFromCart(productId) {
      state.cart = state.cart.filter(item => item.id !== productId);
      renderCart();
    }

    function openSpecialProductModal() {
      els.specialProductForm.reset();
      els.specialProductError.textContent = '';
      els.specialProductModal.classList.add('show');
      els.specialProductModal.setAttribute('aria-hidden', 'false');
      els.specialProductName.focus();
    }

    function closeSpecialProductModal() {
      els.specialProductModal.classList.remove('show');
      els.specialProductModal.setAttribute('aria-hidden', 'true');
    }

    function addSpecialProduct() {
      const name = els.specialProductName.value.trim();
      const priceInput = els.specialProductPrice.value.trim();
      const price = Number(priceInput);

      if (!name) {
        els.specialProductError.textContent = 'Product name is required.';
        els.specialProductName.focus();
        return;
      }
      if (!priceInput || !Number.isFinite(price) || price < 0) {
        els.specialProductError.textContent = 'Enter a valid price.';
        els.specialProductPrice.focus();
        return;
      }

      state.cart.push({
        id: 'special-' + Date.now() + '-' + crypto.randomUUID(),
        sku: 'SPECIAL',
        name,
        category: 'Special Productes',
        cost_price: 0,
        sale_price: Math.round(price * 100) / 100,
        barcode: '',
        image_url: '',
        qty: 1,
        is_special: true
      });
      closeSpecialProductModal();
      renderCart();
      showToast('Special product added to cart.');
    }

    function checkout() {
      if (!state.cart.length) return;

      const total = state.cart.reduce((sum, item) => sum + item.sale_price * item.qty, 0);
      const order = {
        id: 'POS-' + Date.now(),
        store_id: state.storeId,
        customer_name: els.customerInput.value.trim() || 'Walk-in Customer',
        payment_method: state.payment,
        total,
        items: state.cart.map(item => ({
          product_id: item.id,
          sku: item.sku,
          name: item.name,
          qty: item.qty,
          unit_price: item.sale_price,
          line_total: item.sale_price * item.qty
        })),
        created_at: new Date().toISOString()
      };

      const orders = JSON.parse(localStorage.getItem('techm8_pos_demo_orders') || '[]');
      orders.unshift(order);
      localStorage.setItem('techm8_pos_demo_orders', JSON.stringify(orders.slice(0, 50)));

      state.cart.forEach(item => {
        const product = state.products.find(productItem => productItem.id === item.id);
        if (!product) return;
        if (product.store_stock) {
          product.store_stock[state.storeId] = Math.max(0, getProductStock(product) - item.qty);
        } else if (Array.isArray(product.store_inventory)) {
          const currentStore = normalizeStoreKey(state.storeId);
          const row = product.store_inventory.find(inventoryItem => {
            return [
              inventoryItem.store_id,
              inventoryItem.store_slug,
              inventoryItem.store_name,
              inventoryItem.branch,
              inventoryItem.name
            ].some(value => normalizeStoreKey(value) === currentStore);
          });
          if (row) {
            const currentQty = Number(row.qty_on_hand ?? row.stock_qty ?? row.qty ?? row.quantity ?? 0);
            if ('qty_on_hand' in row) row.qty_on_hand = Math.max(0, currentQty - item.qty);
            else if ('stock_qty' in row) row.stock_qty = Math.max(0, currentQty - item.qty);
            else if ('qty' in row) row.qty = Math.max(0, currentQty - item.qty);
            else row.quantity = Math.max(0, currentQty - item.qty);
          }
        } else if (product.store_inventory && typeof product.store_inventory === 'object') {
          const currentStore = normalizeStoreKey(state.storeId);
          const matchedKey = Object.keys(product.store_inventory).find(key => normalizeStoreKey(key) === currentStore);
          if (matchedKey) {
            product.store_inventory[matchedKey] = Math.max(0, Number(product.store_inventory[matchedKey] || 0) - item.qty);
          }
        } else if (typeof product.qty_on_hand === 'number') {
          product.qty_on_hand = Math.max(0, product.qty_on_hand - item.qty);
        }
      });

      state.cart = [];
      els.customerInput.value = '';
      renderProducts();
      renderCart();
      showToast(`${order.id} paid by ${order.payment_method}. ${money(total)} recorded locally.`);
    }

    function holdOrder() {
      if (!state.cart.length) {
        showToast('Cart is empty.');
        return;
      }
      const held = JSON.parse(localStorage.getItem('techm8_pos_held_orders') || '[]');
      held.unshift({
        id: 'HOLD-' + Date.now(),
        customer: els.customerInput.value.trim() || 'Walk-in Customer',
        store_id: state.storeId,
        items: state.cart,
        created_at: new Date().toISOString()
      });
      localStorage.setItem('techm8_pos_held_orders', JSON.stringify(held.slice(0, 20)));
      state.cart = [];
      renderCart();
      showToast('Order placed on hold.');
    }

    function discardCart() {
      if (!state.cart.length) return;
      if (!confirm('Discard current cart?')) return;
      state.cart = [];
      renderCart();
      showToast('Cart discarded.');
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove('show'), 2600);
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    els.categoryTabs.addEventListener('click', event => {
      const button = event.target.closest('[data-category]');
      if (!button) return;
      state.category = button.dataset.category;
      renderAll();
    });

    els.productGrid.addEventListener('click', event => {
      const button = event.target.closest('[data-add]');
      if (!button) return;
      addToCart(button.dataset.add);
    });

    els.productGrid.addEventListener('keydown', event => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      const card = event.target.closest('[data-add]');
      if (!card) return;
      event.preventDefault();
      addToCart(card.dataset.add);
    });

    els.productNavBtn.addEventListener('click', () => setActiveView('products'));
    els.repairNavBtn.addEventListener('click', () => setActiveView('repair'));
    els.newRepairBtn.addEventListener('click', startRepairTicket);
    els.clearRepairBtn.addEventListener('click', clearRepairTicket);

    els.repairWorkspace.addEventListener('change', event => {
      if (event.target.id === 'repairBrandSelect') setRepairSelection('brand', event.target.value);
      if (event.target.id === 'repairModelSelect') setRepairSelection('model', event.target.value);
      if (event.target.id === 'repairIssueSelect') setRepairSelection('issue', event.target.value);
      if (event.target.id === 'repairPhotoInput') {
        Array.from(event.target.files || []).forEach(file => {
          const reader = new FileReader();
          reader.onload = () => {
            state.repair.media.push({ type: 'image', src: reader.result });
            renderRepairWorkspace();
          };
          reader.readAsDataURL(file);
        });
        event.target.value = '';
      }
    });

    els.repairWorkspace.addEventListener('input', event => {
      const map = {
        repairQuotedPrice: 'quotedPrice',
        repairDeviceImei: 'deviceImei',
        repairDeviceSerial: 'deviceSerial',
        repairDeviceIdUnavailable: 'deviceIdUnavailable',
        repairPassword: 'password',
        repairTestNotes: 'testNotes'
      };
      const key = map[event.target.id];
      if (key) state.repair[key] = event.target.value;
    });

    els.repairWorkspace.addEventListener('click', event => {
      const confirmButton = event.target.closest('#confirmRepairBtn');
      const cameraButton = event.target.closest('#repairCameraBtn');
      const videoButton = event.target.closest('#repairVideoBtn');
      const repairChip = event.target.closest('.repair-chip');
      const testOption = event.target.closest('.test-option');

      if (confirmButton) confirmRepairSelection();
      if (cameraButton) {
        const input = els.repairWorkspace.querySelector('#repairPhotoInput');
        if (input) input.click();
      }
      if (videoButton) {
        state.repair.media.push({ type: 'video' });
        renderRepairWorkspace();
      }
      if (repairChip) {
        const group = repairChip.closest('[data-repair-chip-group]');
        if (!group) return;
        state.repair[group.dataset.repairChipGroup] = repairChip.dataset.value;
        if (group.dataset.repairChipGroup === 'deviceIdType' || group.dataset.repairChipGroup === 'testProfile') {
          renderRepairWorkspace();
        } else {
          group.querySelectorAll('.repair-chip').forEach(item => item.classList.remove('active'));
          repairChip.classList.add('active');
        }
      }
      if (testOption) {
        const group = testOption.closest('[data-test-name]');
        if (!group) return;
        state.repair.tests[group.dataset.testName] = testOption.dataset.value;
        group.querySelectorAll('.test-option').forEach(item => item.classList.remove('active'));
        testOption.classList.add('active');
      }
    });

    els.cartArea.addEventListener('click', event => {
      const qtyButton = event.target.closest('[data-qty]');
      const removeButton = event.target.closest('[data-remove]');
      if (qtyButton) changeQty(qtyButton.dataset.qty, qtyButton.dataset.dir);
      if (removeButton) removeFromCart(removeButton.dataset.remove);
    });

    document.querySelectorAll('.payment-option').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.payment-option').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
        state.payment = button.dataset.payment;
      });
    });

    els.searchInput.addEventListener('input', event => {
      state.search = event.target.value;
      renderProducts();
    });

    els.storeSelect.addEventListener('change', event => {
      state.storeId = event.target.value;
      state.cart = [];
      loadProducts();
    });

    els.syncStatus.addEventListener('click', loadProducts);

    els.payBtn.addEventListener('click', checkout);
    els.holdBtn.addEventListener('click', holdOrder);
    els.discardBtn.addEventListener('click', discardCart);
    els.specialProductBtn.addEventListener('click', openSpecialProductModal);
    els.specialProductCancel.addEventListener('click', closeSpecialProductModal);
    els.specialProductModal.addEventListener('click', event => {
      if (event.target === els.specialProductModal) closeSpecialProductModal();
    });
    els.specialProductForm.addEventListener('submit', event => {
      event.preventDefault();
      addSpecialProduct();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && els.specialProductModal.classList.contains('show')) {
        closeSpecialProductModal();
      }
    });

    window.Techm8StaffAuth.init({
      rootSelector: '[data-auth-protected]',
      title: 'POS Access',
      subtitle: 'Enter the staff password to open the TECHM8 point of sale.'
    }).then(() => {
      loadProducts();
      loadRepairQuotes();
    });
  </script>
</body>
</html>
