<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECHM8 Supabase Seed</title>
  <script src="./supabase-config.js"></script>
  <script src="./staff-auth.js"></script>
  <style>
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f9;
      color: #142026;
      margin: 0;
      padding: 32px 16px;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #dde4e8;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 42px rgba(10, 20, 30, 0.08);
    }

    h1 { margin-top: 0; }

    button {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid #163129;
      padding: 0 14px;
      font-size: 15px;
      box-sizing: border-box;
      background: #163129;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .stack { display: grid; gap: 14px; }

    .note {
      background: #f8fafb;
      border: 1px solid #dde4e8;
      border-radius: 16px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.7;
    }

    pre {
      background: #0f1720;
      color: #e8eef2;
      border-radius: 16px;
      padding: 14px;
      overflow: auto;
      min-height: 120px;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
  <div class="card" data-auth-protected>
    <h1>Supabase Seed Tool</h1>
    <div class="note">
      This tool uploads the local <code>data.json</code> and <code>apple_a_model_map.json</code> files into Supabase.
      Run it after you execute <code>supabase_schema.sql</code>. This page now uses the database staff password.
    </div>
    <div class="stack" style="margin-top: 16px;">
      <button id="syncButton" type="button">Sync Local Files To Supabase</button>
      <pre id="output">Waiting...</pre>
    </div>
  </div>

  <script>
    const SUPABASE = window.TECHM8_SUPABASE;
    window.Techm8StaffAuth.init({
      rootSelector: '[data-auth-protected]',
      title: 'Seed Access',
      subtitle: 'Enter the staff password to sync local files into Supabase.'
    });
    const output = document.getElementById('output');
    const button = document.getElementById('syncButton');

    function log(message) {
      output.textContent = message;
    }

    async function fetchJson(path) {
      const response = await fetch(path + '?v=' + Date.now(), { cache: 'no-store' });
      if (!response.ok) throw new Error('Failed to load ' + path);
      return await response.json();
    }

    async function callRpc(name, payload) {
      const response = await fetch(SUPABASE.url + '/rest/v1/rpc/' + name, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: SUPABASE.anonKey,
          Authorization: 'Bearer ' + SUPABASE.anonKey
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();
      if (!response.ok) {
        throw new Error((result && result.message) || JSON.stringify(result));
      }
      return result;
    }

    button.addEventListener('click', async () => {
      button.disabled = true;
      button.textContent = 'Syncing...';

      try {
        log('Loading local files...');
        const [prices, appleMap] = await Promise.all([
          fetchJson('./data.json'),
          fetchJson('./apple_a_model_map.json')
        ]);

        log('Uploading repair_prices...');
        await callRpc('save_repair_prices', {
          session_token: window.Techm8StaffAuth.getToken(),
          payload: prices
        });

        log('Uploading apple_model_map...');
        await callRpc('save_apple_model_map', {
          session_token: window.Techm8StaffAuth.getToken(),
          payload: appleMap
        });

        log('Supabase sync completed successfully.');
      } catch (error) {
        console.error(error);
        log('Sync failed: ' + error.message);
      } finally {
        button.disabled = false;
        button.textContent = 'Sync Local Files To Supabase';
      }
    });
  </script>
</body>
</html>
