              </el-input>
              <el-input v-model.trim="github.branch" placeholder="main">
                <template slot="prepend">Branch</template>
              </el-input>
              <el-input v-model.trim="github.path" placeholder="data.json">
                <template slot="prepend">Path</template>
              </el-input>
            </div>
            <div class="button-group" style="margin-top:12px;">
              <el-button type="primary" plain icon="el-icon-link" @click="openGithubRepo">Open Repo</el-button>
              <el-button type="primary" icon="el-icon-upload2" @click="openGithubEditPage">Open GitHub Editor</el-button>
            </div>
            <div class="muted-note">
              The GitHub buttons remain available as a fallback export path.
            </div>
          </div>
        </div>

        <div v-if="loadError" style="margin-bottom:16px;">
          <el-alert :title="loadError" type="warning" :closable="false" show-icon></el-alert>
        </div>

        <div class="toolbar-card" style="margin-bottom:16px;">
          <div class="toolbar-title">Load And Filter</div>
          <div class="toolbar-subtitle">Load from the database API when available, or fall back to a local JSON file.</div>
          <div class="button-group" style="margin-bottom:12px;">
            <el-button icon="el-icon-refresh" @click="loadInitialData">Reload Data</el-button>
            <el-button icon="el-icon-folder-opened" @click="triggerFilePick">Choose data.json</el-button>
            <input ref="jsonFileInput" type="file" accept="application/json,.json" style="display:none" @change="handleJsonFileChange">
          </div>
          <div class="repo-grid">
            <el-input v-model="keyword" clearable placeholder="Search brand / model / issue" @clear="handleSearchClear"></el-input>
            <el-select v-model="brandFilter" clearable filterable placeholder="Filter by brand">
              <el-option v-for="brand in brandOptions" :key="brand" :label="brand" :value="brand"></el-option>
            </el-select>
          </div>
        </div>

        <div class="table-card">
          <div class="table-head">
            <div>
              <div class="table-head-title">Price Table</div>
              <div class="table-head-subtitle">Edit values here, then save to the database or export JSON as a fallback.</div>
            </div>
            <div class="cell-note">
              Numeric prices show as <strong>$value</strong> on the quote page. Text values remain unchanged.
            </div>
          </div>

          <div class="table-wrap">
            <el-table
              ref="dataTable"
              :data="filteredRows"
              border
              style="width:100%"
              @selection-change="handleSelectionChange"
              empty-text="闂佸搫妫楅崐鐟拔涢妶澶婃瀬闁绘鐗嗙粊锕傛煥濞戞鐒锋い鏇ㄥ墴瀹曟宕煎┑鍡╂奖闁?data.json 闂佺懓鐡ㄩ悧妤呭蓟婵犲啯娅犻柣鎰椤忛亶鎮?
              max-height="720">
              <el-table-column type="selection" width="50"></el-table-column>

              <el-table-column label="#" width="70">
                <template slot-scope="scope">
                  <strong>{{ scope.$index + 1 }}</strong>
                </template>
              </el-table-column>

              <el-table-column label="Brand" min-width="180">
                <template slot-scope="scope">
                  <el-input v-model="scope.row.brand" placeholder="Brand" @keydown.space.native.stop></el-input>
                </template>
              </el-table-column>

              <el-table-column label="Model" min-width="220">
                <template slot-scope="scope">
                  <el-input v-model="scope.row.model" placeholder="Model" @keydown.space.native.stop></el-input>
                </template>
              </el-table-column>

              <el-table-column label="Issue" min-width="240">
                <template slot-scope="scope">
                  <el-input v-model="scope.row.issue" placeholder="Issue" @keydown.space.native.stop></el-input>
                </template>
              </el-table-column>

              <el-table-column label="Price" width="150">
                <template slot-scope="scope">
                  <el-input v-model="scope.row.price" placeholder="婵炴挻鑹鹃鍛淬€?99 / N/A / TBC" @keydown.space.native.stop></el-input>
                </template>
              </el-table-column>

              <el-table-column label="Time" min-width="200">
                <template slot-scope="scope">
                  <el-input v-model="scope.row.time" placeholder="婵炴挻鑹鹃鍛淬€?30 minutes to 2 hours" @keydown.space.native.stop></el-input>
                </template>
              </el-table-column>

              <el-table-column label="闂佺懓鐏濈粔宕囩礊? width="190" fixed="right">
                <template slot-scope="scope">
                  <div class="table-actions">
                    <el-button size="mini" @click="duplicateRow(scope.row)">婵犮垼娉涚粔鎾春?/el-button>
                    <el-button size="mini" type="danger" plain @click="deleteRow(scope.$index, scope.row)">闂佸憡甯炴繛鈧繛?/el-button>
                  </div>
                </template>
              </el-table-column>
            </el-table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = '008009';
    const ADMIN_SESSION_KEY = 'techm8_admin_authed';

    new Vue({
      el: '#app',
      data() {
        return {
          rows: [],
          selectedRows: [],
          keyword: '',
          brandFilter: '',
          loadError: '',
          loadedFileName: '',
          backendMode: '',
          github: {
            owner: 'bowenmiao-tech',
            repo: 'TECHM8-PRICE-LIST',
            branch: 'main',
            path: 'data.json'
          },
          isAuthenticated: false,
          passwordInput: '',
          loginError: ''
        }
      },
      computed: {
        brandOptions() {
          const set = new Set(this.rows.map(row => row.brand).filter(Boolean))
          return Array.from(set).sort((a, b) => String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' }))
        },
        filteredRows() {
          const keyword = this.keyword.trim().toLowerCase()
          return this.rows.filter(row => {
            const matchBrand = !this.brandFilter || row.brand === this.brandFilter
            const matchKeyword = !keyword || [row.brand, row.model, row.issue, row.price, row.time]
              .join(' ')
              .toLowerCase()
              .includes(keyword)
            return matchBrand && matchKeyword
          })
        },
        stats() {
          const brandSet = new Set()
          const modelSet = new Set()
          this.filteredRows.forEach(row => {
            if (row.brand) brandSet.add(row.brand)
            if (row.brand && row.model) modelSet.add(row.brand + '|||' + row.model)
          })
          return {
            brandCount: brandSet.size,
            modelCount: modelSet.size
          }
        }
      },
      mounted() {
        if (sessionStorage.getItem(ADMIN_SESSION_KEY) === '1') {
          this.isAuthenticated = true
          this.loadInitialData()
        }
      },
      methods: {
        login() {
          if (!this.passwordInput) {
            this.loginError = 'Please enter the admin password.'
            return
          }
          if (this.passwordInput !== ADMIN_PASSWORD) {
            this.loginError = 'Incorrect password. Please try again.'
            return
          }
          this.isAuthenticated = true
          this.loginError = ''
          sessionStorage.setItem(ADMIN_SESSION_KEY, '1')
          this.$nextTick(() => {
            if (!this.rows.length) this.loadInitialData()
          })
        },
        logout() {
          this.isAuthenticated = false
          this.passwordInput = ''
          sessionStorage.removeItem(ADMIN_SESSION_KEY)
        },
        normalizeRow(row) {
          return {
            id: row && row.id ? row.id : this.makeId(),
            brand: row && row.brand !== undefined ? String(row.brand).trim() : '',
            model: row && row.model !== undefined ? String(row.model).trim() : '',
            issue: row && row.issue !== undefined ? String(row.issue).trim() : '',
            price: row && row.price !== undefined && row.price !== null ? String(row.price).trim() : '',
            time: row && row.time !== undefined && row.time !== null ? String(row.time).trim() : ''
          }
        },
        makeId() {
          return 'row_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9)
        },
        triggerFilePick() {
          if (this.$refs.jsonFileInput) this.$refs.jsonFileInput.click()
        },
        async loadInitialData() {
          const isFileProtocol = window.location.protocol === 'file:'
          if (isFileProtocol) {
            this.loadError = 'You opened the admin page from a local file. Please choose data.json manually.'
            return
          }
          try {
            const response = await fetch('./data.json?v=' + Date.now(), {
              cache: 'no-store',
              headers: { 'Cache-Control': 'no-cache' }
            })
            if (!response.ok) throw new Error('HTTP ' + response.status)
            const data = await response.json()
            this.applyData(data, 'data.json')
            this.loadError = ''
          } catch (error) {
            console.error(error)
            this.loadError = 'Automatic loading failed. You can still choose a JSON file manually.'
          }
        },
        handleJsonFileChange(event) {
          const file = event.target.files && event.target.files[0]
          if (!file) return
          const reader = new FileReader()
          reader.onload = () => {
            try {
              const parsed = JSON.parse(reader.result)
              this.applyData(parsed, file.name)
              this.loadError = ''
              this.$message.success('JSON file loaded successfully')
            } catch (error) {
              console.error(error)
              this.$message.error('Invalid JSON file')
            }
          }
          reader.onerror = () => {
            this.$message.error('File read failed')
          }
          reader.readAsText(file, 'utf-8')
          event.target.value = ''
        },
        applyData(data, fileName) {
          if (!Array.isArray(data)) throw new Error('Price data must be an array')
          this.rows = data.map(item => this.normalizeRow(item))
          this.loadedFileName = fileName || 'data.json'
          this.selectedRows = []
          if (this.$refs.dataTable) this.$refs.dataTable.clearSelection()
        },
        handleSelectionChange(rows) {
          this.selectedRows = rows
        },
        addRow() {
          this.rows.unshift(this.normalizeRow({ brand: '', model: '', issue: '', price: '', time: '' }))
          this.$message.success('Row added')
        },
        duplicateRow(row) {
          this.rows.unshift(this.normalizeRow(row))
          this.$message.success('Row duplicated')
        },
        duplicateSelected() {
          if (this.selectedRows.length !== 1) {
            this.$message.warning('Select one row to duplicate')
            return
          }
          this.duplicateRow(this.selectedRows[0])
        },
        deleteRow(index, row) {
          this.$confirm(`Delete ${row.brand || 'Unnamed brand'} / ${row.model || 'Unnamed model'} / ${row.issue || 'Unnamed issue'}?`, 'Confirm', {
            type: 'warning'
          }).then(() => {
            this.rows = this.rows.filter(item => item.id !== row.id)
            this.$message.success('Row deleted')
          }).catch(() => {})
        },
        deleteSelected() {
          if (!this.selectedRows.length) {
            this.$message.warning('Select rows first')
            return
          }
          const ids = new Set(this.selectedRows.map(item => item.id))
          this.$confirm(`Delete ${this.selectedRows.length} selected row(s)?`, 'Confirm', {
            type: 'warning'
          }).then(() => {
            this.rows = this.rows.filter(item => !ids.has(item.id))
            this.selectedRows = []
            if (this.$refs.dataTable) this.$refs.dataTable.clearSelection()
            this.$message.success('Rows deleted')
          }).catch(() => {})
        },
        validateRows() {
          const cleaned = this.rows.map(row => this.normalizeRow(row))
          const invalid = cleaned.find(row => !row.brand || !row.model || !row.issue)
          if (invalid) {
            this.$message.error('brand, model, and issue are required for every row')
            return null
          }
          cleaned.sort((a, b) => {
            return (
              String(a.brand).localeCompare(String(b.brand), undefined, { numeric: true, sensitivity: 'base' }) ||
              String(a.model).localeCompare(String(b.model), undefined, { numeric: true, sensitivity: 'base' }) ||
              String(a.issue).localeCompare(String(b.issue), undefined, { numeric: true, sensitivity: 'base' })
            )
          })
          return cleaned.map(({ brand, model, issue, price, time }) => ({ brand, model, issue, price, time }))
        },
        buildJsonText() {
          const cleaned = this.validateRows()
          if (!cleaned) return null
          return JSON.stringify(cleaned, null, 2)
        },
        async copyJson() {
          const jsonText = this.buildJsonText()
          if (!jsonText) return
          try {
            await navigator.clipboard.writeText(jsonText)
            this.$message.success('JSON copied to clipboard')
          } catch (error) {
            console.error(error)
            this.$message.error('Copy failed')
          }
        },
        downloadJson() {
          const jsonText = this.buildJsonText()
          if (!jsonText) return
          const blob = new Blob([jsonText], { type: 'application/json;charset=utf-8' })
          const url = URL.createObjectURL(blob)
          const link = document.createElement('a')
          link.href = url
          link.download = 'data.json'
          document.body.appendChild(link)
          link.click()
          document.body.removeChild(link)
          URL.revokeObjectURL(url)
          this.$message.success('data.json downloaded')
        },
        githubEditUrl() {
          const owner = this.github.owner || 'bowenmiao-tech'
          const repo = this.github.repo || 'TECHM8-PRICE-LIST'
          const branch = this.github.branch || 'main'
          const path = this.github.path || 'data.json'
          return `https://github.com/${owner}/${repo}/edit/${branch}/${path}`
        },
        githubRepoUrl() {
          const owner = this.github.owner || 'bowenmiao-tech'
          const repo = this.github.repo || 'TECHM8-PRICE-LIST'
          return `https://github.com/${owner}/${repo}`
        },
        async openGithubEditPage() {
          const jsonText = this.buildJsonText()
          if (!jsonText) return
          try {
            await navigator.clipboard.writeText(jsonText)
            this.$message.success('JSON copied. Opening GitHub editor.')
          } catch (error) {
            console.error(error)
            this.$message.warning('Opening GitHub editor, but clipboard copy failed.')
          }
          window.open(this.githubEditUrl(), '_blank')
        },
        openGithubRepo() {
          window.open(this.githubRepoUrl(), '_blank')
        }
      }
    })
  </script>
  <script>
    (function () {
      function createActionButton(text, className, handler) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = className;
        button.innerHTML = '<span>' + text + '</span>';
        button.addEventListener('click', handler);
        return button;
      }

      function addDatabaseButtons(vm) {
        const toolbarGroups = document.querySelectorAll('.toolbar-card .button-group');
        if (!toolbarGroups.length) return;

        const editToolsGroup = toolbarGroups[0];
        const loadGroup = toolbarGroups[1];

        if (editToolsGroup && !document.getElementById('save-db-btn')) {
          const saveButton = createActionButton('Save To Database', 'el-button el-button--primary', () => vm.saveToDatabase());
          saveButton.id = 'save-db-btn';
          editToolsGroup.insertBefore(saveButton, editToolsGroup.firstChild);
        }

        if (loadGroup && !document.getElementById('load-db-btn')) {
          const loadButton = createActionButton('Load From Database', 'el-button el-button--success is-plain', () => vm.loadInitialData());
          loadButton.id = 'load-db-btn';
          loadGroup.insertBefore(loadButton, loadGroup.firstChild);
        }
      }

      function enhanceAdmin() {
        const root = document.getElementById('app');
        const vm = root && root.__vue__;
        if (!vm || vm.__dbEnhanced) return false;

        vm.__dbEnhanced = true;
        if (typeof vm.backendMode === 'undefined') {
          vm.$set(vm, 'backendMode', '');
        }

        vm.fetchRowsFromApi = async function () {
          const response = await fetch('./api/prices.php?v=' + Date.now(), {
            cache: 'no-store',
            headers: { 'Cache-Control': 'no-cache' }
          });
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return await response.json();
        };

        vm.loadInitialData = async function () {
          try {
            const data = await this.fetchRowsFromApi();
            this.applyData(data, 'Database');
            this.backendMode = 'database';
            this.loadError = '';
          } catch (error) {
            try {
              const response = await fetch('./data.json?v=' + Date.now(), {
                cache: 'no-store',
                headers: { 'Cache-Control': 'no-cache' }
              });
              if (!response.ok) throw new Error('HTTP ' + response.status);
              const data = await response.json();
              this.applyData(data, 'data.json');
              this.backendMode = 'file';
              this.loadError = 'Database API is not available yet, so the editor loaded local data.json instead.';
            } catch (fallbackError) {
              console.error(error);
              console.error(fallbackError);
              this.loadError = 'Could not load data from the database API or local data.json.';
            }
          }
        };

        vm.saveToDatabase = async function () {
          const cleaned = this.validateRows();
          if (!cleaned) return;

          try {
            const response = await fetch('./api/prices.php', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                replace_all: true,
                rows: cleaned
              })
            });

            const result = await response.json();
            if (!response.ok || !result.ok) {
              throw new Error((result && result.message) || 'Save failed');
            }

            this.backendMode = 'database';
            this.loadedFileName = 'Database';
            this.$message.success('Price list saved to database');
          } catch (error) {
            console.error(error);
            this.$message.error('Could not save to database');
          }
        };

        const originalApplyData = vm.applyData.bind(vm);
        vm.applyData = function (data, fileName) {
          originalApplyData(data, fileName);
          if (fileName === 'Database') {
            this.backendMode = 'database';
          }
        };

        addDatabaseButtons(vm);

        if (sessionStorage.getItem(ADMIN_SESSION_KEY) === '1' && !vm.rows.length) {
          vm.loadInitialData();
        }

        return true;
      }

      if (!enhanceAdmin()) {
        const timer = setInterval(() => {
          if (enhanceAdmin()) clearInterval(timer);
        }, 200);
        setTimeout(() => clearInterval(timer), 10000);
      }
    })();
  </script>
</body>
</html>
